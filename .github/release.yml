changelog:
  exclude:
    labels:
      - skip-changelog
  categories:
    - title: 新功能
      labels:
        - feature
        - enhancement
        - feat
    - title: 修复
      labels:
        - fix
        - bug
        - bugfix
    - title: 性能优化
      labels:
        - perf
        - performance
    - title: 重构
      labels:
        - refactor
    - title: 文档
      labels:
        - docs
    - title: 构建与发布
      labels:
        - ci
        - build
        - chore
    - title: 测试
      labels:
        - test
        - tests
    - title: 其他变更
      labels:
        - "*"
