name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release:
    name: Release ${{ matrix.name }}
    runs-on: ${{ matrix.platform }}
    env:
      APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
      APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
      APPLE_API_PRIVATE_KEY: ${{ secrets.APPLE_API_PRIVATE_KEY }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS Apple Silicon
            platform: macos-14
            targets: "aarch64-apple-darwin"
            args: "--target aarch64-apple-darwin"
            is_macos: true
          - name: macOS Intel
            platform: macos-14
            targets: "x86_64-apple-darwin"
            args: "--target x86_64-apple-darwin"
            is_macos: true
          - name: Windows
            platform: windows-2022
            targets: ""
            args: ""
            is_macos: false

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.targets }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install root dependencies
        run: npm ci

      - name: Install node-backend dependencies
        run: npm ci --prefix node-backend

      - name: Verify updater signing secrets
        shell: bash
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          set -euo pipefail

          if [ -z "${TAURI_SIGNING_PRIVATE_KEY:-}" ]; then
            echo "缺少 TAURI_SIGNING_PRIVATE_KEY，无法生成 updater 签名产物。" >&2
            exit 1
          fi

          if [ -z "${TAURI_SIGNING_PRIVATE_KEY_PASSWORD:-}" ]; then
            echo "缺少 TAURI_SIGNING_PRIVATE_KEY_PASSWORD，无法解锁 updater 私钥。" >&2
            exit 1
          fi

      - name: Build shared CLI assets
        run: npm run build:cli

      - name: Prepare macOS CI environment
        if: ${{ matrix.is_macos }}
        shell: bash
        run: |
          echo "APPLE_API_KEY_PATH=$RUNNER_TEMP/AuthKey.p8" >> "$GITHUB_ENV"
          echo "APPLE_CERTIFICATE_IMPORT_STATUS=not_configured" >> "$GITHUB_ENV"

      - name: Import Apple Developer certificate
        if: ${{ matrix.is_macos }}
        shell: bash
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          set -uo pipefail

          if [ -z "${APPLE_CERTIFICATE:-}" ] || [ -z "${APPLE_CERTIFICATE_PASSWORD:-}" ] || [ -z "${KEYCHAIN_PASSWORD:-}" ]; then
            echo "WARN: 未配置完整的 Apple 证书 secrets，跳过证书导入。"
            exit 0
          fi

          CERT_PATH="$RUNNER_TEMP/certificate.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain-db"

          if ! printf '%s' "$APPLE_CERTIFICATE" | base64 --decode > "$CERT_PATH" 2>/dev/null; then
            echo "WARN: APPLE_CERTIFICATE 不是有效的 base64 内容，跳过 macOS 签名。" >&2
            echo "APPLE_CERTIFICATE_IMPORT_STATUS=invalid_base64" >> "$GITHUB_ENV"
            exit 0
          fi

          if ! openssl pkcs12 -in "$CERT_PATH" -passin "pass:$APPLE_CERTIFICATE_PASSWORD" -nokeys >/dev/null 2>&1; then
            echo "WARN: Apple 证书文件无法被 openssl 解析，请检查 APPLE_CERTIFICATE / APPLE_CERTIFICATE_PASSWORD 是否匹配。" >&2
            echo "APPLE_CERTIFICATE_IMPORT_STATUS=invalid_certificate_or_password" >> "$GITHUB_ENV"
            exit 0
          fi

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security default-keychain -s "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -t 3600 -u "$KEYCHAIN_PATH"

          if ! security import "$CERT_PATH" -k "$KEYCHAIN_PATH" -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security; then
            echo "WARN: security import 导入 Apple 证书失败，已回退为未签名构建。" >&2
            echo "APPLE_CERTIFICATE_IMPORT_STATUS=security_import_failed" >> "$GITHUB_ENV"
            exit 0
          fi

          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"

          CERT_ID=$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" | awk -F'"' '/Developer ID Application/ { print $2; exit }')
          if [ -z "$CERT_ID" ]; then
            echo "WARN: 证书已导入，但未找到 Developer ID Application 身份，已回退为未签名构建。" >&2
            echo "APPLE_CERTIFICATE_IMPORT_STATUS=developer_id_not_found" >> "$GITHUB_ENV"
            exit 0
          fi

          echo "APPLE_SIGNING_IDENTITY=$CERT_ID" >> "$GITHUB_ENV"
          echo "APPLE_CERTIFICATE_IMPORT_STATUS=imported" >> "$GITHUB_ENV"

      - name: Write App Store Connect API key
        if: ${{ matrix.is_macos && env.APPLE_API_KEY != '' && env.APPLE_API_ISSUER != '' && env.APPLE_API_PRIVATE_KEY != '' }}
        shell: bash
        run: |
          set -euo pipefail
          printf '%s' "$APPLE_API_PRIVATE_KEY" > "$APPLE_API_KEY_PATH"

      - name: Print macOS signing summary
        if: ${{ matrix.is_macos }}
        shell: bash
        run: |
          if [ "${APPLE_CERTIFICATE_IMPORT_STATUS:-not_configured}" != "imported" ] && [ "${APPLE_CERTIFICATE_IMPORT_STATUS:-not_configured}" != "not_configured" ]; then
            echo "WARN: Apple 证书导入状态为 ${APPLE_CERTIFICATE_IMPORT_STATUS}，本次 macOS 产物将回退为未签名构建。"
          fi

          if [ -z "${APPLE_SIGNING_IDENTITY:-}" ]; then
            echo "WARN: 未配置 Developer ID 证书，本次 macOS 产物仍会触发 Gatekeeper 提示。"
          fi

          if [ -z "${APPLE_API_KEY:-}" ] || [ -z "${APPLE_API_ISSUER:-}" ] || [ ! -f "${APPLE_API_KEY_PATH:-}" ]; then
            if [ -z "${APPLE_ID:-}" ] || [ -z "${APPLE_PASSWORD:-}" ] || [ -z "${APPLE_TEAM_ID:-}" ]; then
              echo "WARN: 未配置 notarization 凭据，本次 macOS 产物仍会显示“Apple 无法验证”。"
            fi
          fi

      - name: Build and publish release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ env.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ env.APPLE_ID }}
          APPLE_PASSWORD: ${{ env.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ env.APPLE_TEAM_ID }}
          APPLE_API_KEY: ${{ env.APPLE_API_KEY }}
          APPLE_API_ISSUER: ${{ env.APPLE_API_ISSUER }}
          APPLE_API_KEY_PATH: ${{ env.APPLE_API_KEY_PATH }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: Aite ${{ github.ref_name }}
          releaseBody: |
            Aite 自动构建发布产物。

            该 release 同时包含桌面安装包与 Tauri updater 所需的更新元数据。
          releaseDraft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          args: ${{ matrix.args }}
