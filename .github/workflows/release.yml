name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-macos:
    name: Release ${{ matrix.name }}
    runs-on: macos-14
    env:
      APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
      APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
      APPLE_API_PRIVATE_KEY: ${{ secrets.APPLE_API_PRIVATE_KEY }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS Apple Silicon
            rust_target: aarch64-apple-darwin
            bundle_dir: src-tauri/target/aarch64-apple-darwin/release/bundle
            updater_suffix: aarch64
          - name: macOS Intel
            rust_target: x86_64-apple-darwin
            bundle_dir: src-tauri/target/x86_64-apple-darwin/release/bundle
            updater_suffix: x64

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install root dependencies
        run: npm ci

      - name: Install node-backend dependencies
        run: npm ci --prefix node-backend

      - name: Verify updater signing secrets
        shell: bash
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          set -euo pipefail

          if [ -z "${TAURI_SIGNING_PRIVATE_KEY:-}" ]; then
            echo "缺少 TAURI_SIGNING_PRIVATE_KEY，无法生成 updater 签名产物。" >&2
            exit 1
          fi

          if [ -z "${TAURI_SIGNING_PRIVATE_KEY_PASSWORD:-}" ]; then
            echo "缺少 TAURI_SIGNING_PRIVATE_KEY_PASSWORD，无法解锁 updater 私钥。" >&2
            exit 1
          fi

      - name: Prepare macOS CI environment
        shell: bash
        run: |
          echo "APPLE_API_KEY_PATH=$RUNNER_TEMP/AuthKey.p8" >> "$GITHUB_ENV"
          echo "APPLE_CERTIFICATE_IMPORT_STATUS=not_configured" >> "$GITHUB_ENV"

      - name: Import Apple Developer certificate
        shell: bash
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          set -uo pipefail

          if [ -z "${APPLE_CERTIFICATE:-}" ] || [ -z "${APPLE_CERTIFICATE_PASSWORD:-}" ] || [ -z "${KEYCHAIN_PASSWORD:-}" ]; then
            echo "WARN: 未配置完整的 Apple 证书 secrets，跳过证书导入。"
            exit 0
          fi

          CERT_PATH="$RUNNER_TEMP/certificate.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain-db"

          if ! printf '%s' "$APPLE_CERTIFICATE" | base64 --decode > "$CERT_PATH" 2>/dev/null; then
            echo "WARN: APPLE_CERTIFICATE 不是有效的 base64 内容，跳过 macOS 签名。" >&2
            echo "APPLE_CERTIFICATE_IMPORT_STATUS=invalid_base64" >> "$GITHUB_ENV"
            exit 0
          fi

          if ! openssl pkcs12 -in "$CERT_PATH" -passin "pass:$APPLE_CERTIFICATE_PASSWORD" -nokeys >/dev/null 2>&1; then
            echo "WARN: Apple 证书文件无法被 openssl 解析，请检查 APPLE_CERTIFICATE / APPLE_CERTIFICATE_PASSWORD 是否匹配。" >&2
            echo "APPLE_CERTIFICATE_IMPORT_STATUS=invalid_certificate_or_password" >> "$GITHUB_ENV"
            exit 0
          fi

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security default-keychain -s "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -t 3600 -u "$KEYCHAIN_PATH"

          if ! security import "$CERT_PATH" -k "$KEYCHAIN_PATH" -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security; then
            echo "WARN: security import 导入 Apple 证书失败，已回退为未签名构建。" >&2
            echo "APPLE_CERTIFICATE_IMPORT_STATUS=security_import_failed" >> "$GITHUB_ENV"
            exit 0
          fi

          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"

          CERT_ID=$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" | awk -F'"' '/Developer ID Application/ { print $2; exit }')
          if [ -z "$CERT_ID" ]; then
            echo "WARN: 证书已导入，但未找到 Developer ID Application 身份，已回退为未签名构建。" >&2
            echo "APPLE_CERTIFICATE_IMPORT_STATUS=developer_id_not_found" >> "$GITHUB_ENV"
            exit 0
          fi

          echo "APPLE_SIGNING_IDENTITY=$CERT_ID" >> "$GITHUB_ENV"
          echo "APPLE_CERTIFICATE_IMPORT_STATUS=imported" >> "$GITHUB_ENV"

      - name: Write App Store Connect API key
        if: ${{ env.APPLE_API_KEY != '' && env.APPLE_API_ISSUER != '' && env.APPLE_API_PRIVATE_KEY != '' }}
        shell: bash
        run: |
          set -euo pipefail
          printf '%s' "$APPLE_API_PRIVATE_KEY" > "$APPLE_API_KEY_PATH"

      - name: Build macOS bundle
        shell: bash
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          set -euo pipefail

          if [ "${APPLE_CERTIFICATE_IMPORT_STATUS:-not_configured}" = "imported" ]; then
            echo "INFO: 使用 Developer ID 证书构建并尝试 notarization。"
            npx tauri build --target "${{ matrix.rust_target }}"
          else
            echo "WARN: 未检测到可用 Apple 证书，回退为未签名 macOS 构建。"
            env -u APPLE_CERTIFICATE -u APPLE_CERTIFICATE_PASSWORD -u KEYCHAIN_PASSWORD \
              -u APPLE_SIGNING_IDENTITY -u APPLE_ID -u APPLE_PASSWORD -u APPLE_TEAM_ID \
              -u APPLE_API_KEY -u APPLE_API_ISSUER -u APPLE_API_KEY_PATH -u APPLE_API_PRIVATE_KEY \
              npx tauri build --target "${{ matrix.rust_target }}"
          fi

      - name: Collect macOS artifacts
        shell: bash
        run: |
          set -euo pipefail

          VERSION=$(node -p "require('./package.json').version")
          ASSET_DIR="$RUNNER_TEMP/release-assets"
          BUNDLE_DIR="${{ matrix.bundle_dir }}"

          rm -rf "$ASSET_DIR"
          mkdir -p "$ASSET_DIR"

          DMG=$(find "$BUNDLE_DIR" -path "*/dmg/*.dmg" -type f | head -1 || true)
          if [ -z "$DMG" ]; then
            echo "未找到 macOS dmg 安装包" >&2
            exit 1
          fi
          cp "$DMG" "$ASSET_DIR/Aite-v${VERSION}-macOS-${{ matrix.updater_suffix }}.dmg"

          TAR_GZ=$(find "$BUNDLE_DIR" -path "*/macos/*.app.tar.gz" -type f | head -1 || true)
          if [ -z "$TAR_GZ" ]; then
            echo "未找到 macOS updater 包 (*.app.tar.gz)" >&2
            exit 1
          fi
          cp "$TAR_GZ" "$ASSET_DIR/Aite_${{ matrix.updater_suffix }}.app.tar.gz"

          SIG=$(find "$BUNDLE_DIR" -path "*/macos/*.sig" -type f | head -1 || true)
          if [ -z "$SIG" ]; then
            echo "未找到 macOS updater 签名 (*.sig)" >&2
            exit 1
          fi
          cp "$SIG" "$ASSET_DIR/Aite_${{ matrix.updater_suffix }}.app.tar.gz.sig"

          {
            echo "### ${{ matrix.name }}"
            echo ""
            echo "- Aite-v${VERSION}-macOS-${{ matrix.updater_suffix }}.dmg"
            echo "- Aite_${{ matrix.updater_suffix }}.app.tar.gz"
            echo "- Aite_${{ matrix.updater_suffix }}.app.tar.gz.sig"
            echo ""
            if [ "${APPLE_CERTIFICATE_IMPORT_STATUS:-not_configured}" = "imported" ]; then
              echo "- 已启用 Apple 签名身份: ${APPLE_SIGNING_IDENTITY}"
            else
              echo "- 未配置 Apple 证书，当前为未签名构建"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-macos-${{ matrix.updater_suffix }}
          path: ${{ runner.temp }}/release-assets/*
          if-no-files-found: error

  build-windows:
    name: Release Windows
    runs-on: windows-2022

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install root dependencies
        run: npm ci

      - name: Install node-backend dependencies
        run: npm ci --prefix node-backend

      - name: Verify updater signing secrets
        shell: bash
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          set -euo pipefail

          if [ -z "${TAURI_SIGNING_PRIVATE_KEY:-}" ]; then
            echo "缺少 TAURI_SIGNING_PRIVATE_KEY，无法生成 updater 签名产物。" >&2
            exit 1
          fi

          if [ -z "${TAURI_SIGNING_PRIVATE_KEY_PASSWORD:-}" ]; then
            echo "缺少 TAURI_SIGNING_PRIVATE_KEY_PASSWORD，无法解锁 updater 私钥。" >&2
            exit 1
          fi

      - name: Build shared CLI assets
        run: npm run build:cli

      - name: Build Windows MSI
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          npx tauri build

      - name: Collect Windows artifacts
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'

          $version = node -p "require('./package.json').version"
          $assetDir = Join-Path $env:RUNNER_TEMP 'release-assets'

          if (Test-Path $assetDir) {
            Remove-Item -Recurse -Force $assetDir
          }
          New-Item -ItemType Directory -Path $assetDir | Out-Null

          $msi = Get-ChildItem -Path 'src-tauri/target' -Recurse -Filter *.msi | Select-Object -First 1
          if ($null -eq $msi) {
            throw '未找到 Windows MSI 安装包'
          }
          Copy-Item $msi.FullName (Join-Path $assetDir "Aite-v$version-Windows.msi")

          $sig = Get-ChildItem -Path 'src-tauri/target' -Recurse -Filter *.sig | Where-Object { $_.FullName -match 'bundle[\\/]+msi|bundle[\\/]+nsis' } | Select-Object -First 1
          if ($null -ne $sig) {
            Copy-Item $sig.FullName (Join-Path $assetDir $sig.Name)
          }

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-windows
          path: ${{ runner.temp }}/release-assets/*
          if-no-files-found: error

  publish-release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs:
      - build-macos
      - build-windows

    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: ${{ runner.temp }}/release-assets
          merge-multiple: true

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Aite ${{ github.ref_name }}
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: ${{ runner.temp }}/release-assets/*
