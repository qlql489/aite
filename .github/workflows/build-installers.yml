name: Build Installers

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: Release 标签，例如 v0.1.0
        required: true
        type: string
      release_name:
        description: Release 名称，留空则使用默认值
        required: false
        default: ""
        type: string
      draft:
        description: 是否保存为草稿 Release
        required: false
        default: false
        type: boolean
      prerelease:
        description: 是否标记为预发布
        required: false
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: build-installers-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-macos:
    name: Build macOS Installers
    runs-on: macos-14
    env:
      APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
      APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
      APPLE_API_PRIVATE_KEY: ${{ secrets.APPLE_API_PRIVATE_KEY }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Add macOS universal targets
        run: rustup target add aarch64-apple-darwin x86_64-apple-darwin

      - name: Install root dependencies
        run: npm ci

      - name: Install node-backend dependencies
        run: npm ci --prefix node-backend

      - name: Prepare macOS CI environment
        shell: bash
        run: |
          echo "APPLE_API_KEY_PATH=$RUNNER_TEMP/AuthKey.p8" >> "$GITHUB_ENV"
          echo "APPLE_CERTIFICATE_IMPORT_STATUS=not_configured" >> "$GITHUB_ENV"

      - name: Import Apple Developer certificate
        shell: bash
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          set -uo pipefail

          if [ -z "${APPLE_CERTIFICATE:-}" ] || [ -z "${APPLE_CERTIFICATE_PASSWORD:-}" ] || [ -z "${KEYCHAIN_PASSWORD:-}" ]; then
            echo "WARN: 未配置完整的 Apple 证书 secrets，跳过证书导入。"
            exit 0
          fi

          CERT_PATH="$RUNNER_TEMP/certificate.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain-db"
          CERT_STATUS="import_failed"

          if ! printf '%s' "$APPLE_CERTIFICATE" | base64 --decode > "$CERT_PATH" 2>/dev/null; then
            echo "WARN: APPLE_CERTIFICATE 不是有效的 base64 内容，跳过 macOS 签名。" >&2
            echo "APPLE_CERTIFICATE_IMPORT_STATUS=invalid_base64" >> "$GITHUB_ENV"
            exit 0
          fi

          if ! openssl pkcs12 -in "$CERT_PATH" -passin "pass:$APPLE_CERTIFICATE_PASSWORD" -nokeys >/dev/null 2>&1; then
            echo "WARN: Apple 证书文件无法被 openssl 解析，请检查 APPLE_CERTIFICATE / APPLE_CERTIFICATE_PASSWORD 是否匹配。" >&2
            echo "APPLE_CERTIFICATE_IMPORT_STATUS=invalid_certificate_or_password" >> "$GITHUB_ENV"
            exit 0
          fi

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security default-keychain -s "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -t 3600 -u "$KEYCHAIN_PATH"

          if ! security import "$CERT_PATH" -k "$KEYCHAIN_PATH" -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security; then
            echo "WARN: security import 导入 Apple 证书失败，已回退为未签名构建。" >&2
            echo "APPLE_CERTIFICATE_IMPORT_STATUS=security_import_failed" >> "$GITHUB_ENV"
            exit 0
          fi

          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"

          CERT_ID=$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" | awk -F'"' '/Developer ID Application/ { print $2; exit }')
          if [ -z "$CERT_ID" ]; then
            echo "WARN: 证书已导入，但未找到 Developer ID Application 身份，已回退为未签名构建。" >&2
            echo "APPLE_CERTIFICATE_IMPORT_STATUS=developer_id_not_found" >> "$GITHUB_ENV"
            exit 0
          fi

          CERT_STATUS="imported"
          echo "APPLE_SIGNING_IDENTITY=$CERT_ID" >> "$GITHUB_ENV"
          echo "APPLE_CERTIFICATE_IMPORT_STATUS=$CERT_STATUS" >> "$GITHUB_ENV"

      - name: Write App Store Connect API key
        if: ${{ env.APPLE_API_KEY != '' && env.APPLE_API_ISSUER != '' && env.APPLE_API_PRIVATE_KEY != '' }}
        shell: bash
        run: |
          set -euo pipefail
          printf '%s' "$APPLE_API_PRIVATE_KEY" > "$APPLE_API_KEY_PATH"

      - name: Build universal macOS bundle
        shell: bash
        run: |
          if [ "${APPLE_CERTIFICATE_IMPORT_STATUS:-not_configured}" != "imported" ] && [ "${APPLE_CERTIFICATE_IMPORT_STATUS:-not_configured}" != "not_configured" ]; then
            echo "WARN: Apple 证书导入状态为 ${APPLE_CERTIFICATE_IMPORT_STATUS}，本次 macOS 产物将回退为未签名构建。"
          fi

          if [ -z "${APPLE_SIGNING_IDENTITY:-}" ]; then
            echo "WARN: 未配置 Developer ID 证书，本次 macOS 产物仍会触发 Gatekeeper 提示。"
          fi

          if [ -z "${APPLE_API_KEY:-}" ] || [ -z "${APPLE_API_ISSUER:-}" ] || [ ! -f "${APPLE_API_KEY_PATH:-}" ]; then
            if [ -z "${APPLE_ID:-}" ] || [ -z "${APPLE_PASSWORD:-}" ] || [ -z "${APPLE_TEAM_ID:-}" ]; then
              echo "WARN: 未配置 notarization 凭据，本次 macOS 产物仍会显示“Apple 无法验证”。"
            fi
          fi

          npm run build:cli
          env -u APPLE_CERTIFICATE -u APPLE_CERTIFICATE_PASSWORD -u KEYCHAIN_PASSWORD \
            npx tauri build --target universal-apple-darwin --config src-tauri/tauri.private-ci.conf.json

      - name: Prepare macOS artifacts
        shell: bash
        run: |
          set -euo pipefail

          VERSION=$(node -p "require('./package.json').version")
          ASSET_DIR="$RUNNER_TEMP/aite-macos-artifacts"
          BUNDLE_DIR="src-tauri/target/universal-apple-darwin/release/bundle"

          rm -rf "$ASSET_DIR"
          mkdir -p "$ASSET_DIR"

          DMG=$(find "$BUNDLE_DIR" -name "*.dmg" -type f | head -1 || true)
          APP_PATH=$(find "$BUNDLE_DIR" -name "*.app" -type d | head -1 || true)

          if [ -z "$DMG" ]; then
            echo "未找到 macOS dmg 安装包" >&2
            exit 1
          fi

          if [ -z "$APP_PATH" ]; then
            echo "未找到 macOS .app，无法生成 zip" >&2
            exit 1
          fi

          cp "$DMG" "$ASSET_DIR/Aite-v${VERSION}-macOS.dmg"

          APP_DIR=$(dirname "$APP_PATH")
          APP_NAME=$(basename "$APP_PATH")
          (
            cd "$APP_DIR"
            ditto -c -k --sequesterRsrc --keepParent "$APP_NAME" "$ASSET_DIR/Aite-v${VERSION}-macOS.zip"
          )

          {
            echo "### macOS 产物"
            echo ""
            echo "- Aite-v${VERSION}-macOS.dmg"
            echo "- Aite-v${VERSION}-macOS.zip"
            echo ""
            if [ -n "${APPLE_SIGNING_IDENTITY:-}" ]; then
              echo "- 已检测到 Developer ID 签名身份: ${APPLE_SIGNING_IDENTITY}"
            else
              echo "- 未配置 Developer ID 签名身份，Gatekeeper 仍会拦截"
            fi
            if [ "${APPLE_CERTIFICATE_IMPORT_STATUS:-not_configured}" != "not_configured" ]; then
              echo "- 证书导入状态: ${APPLE_CERTIFICATE_IMPORT_STATUS}"
            fi
            if { [ -n "${APPLE_API_KEY:-}" ] && [ -n "${APPLE_API_ISSUER:-}" ] && [ -f "${APPLE_API_KEY_PATH:-}" ]; } || { [ -n "${APPLE_ID:-}" ] && [ -n "${APPLE_PASSWORD:-}" ] && [ -n "${APPLE_TEAM_ID:-}" ]; }; then
              echo "- 已提供 notarization 凭据"
            else
              echo "- 未提供 notarization 凭据，用户打开时仍会看到“Apple 无法验证”"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: aite-macos-installers
          path: ${{ runner.temp }}/aite-macos-artifacts/*
          if-no-files-found: error

  build-windows:
    name: Build Windows Installer
    runs-on: windows-2022

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install root dependencies
        run: npm ci

      - name: Install node-backend dependencies
        run: npm ci --prefix node-backend

      - name: Build Windows MSI
        run: |
          npm run build:cli
          npx tauri build --config src-tauri/tauri.private-ci.conf.json

      - name: Prepare Windows artifact
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'

          $version = node -p "require('./package.json').version"
          $assetDir = Join-Path $env:RUNNER_TEMP 'aite-windows-artifacts'

          if (Test-Path $assetDir) {
            Remove-Item -Recurse -Force $assetDir
          }
          New-Item -ItemType Directory -Path $assetDir | Out-Null

          $msi = Get-ChildItem -Path 'src-tauri/target' -Recurse -Filter *.msi | Select-Object -First 1
          if ($null -eq $msi) {
            throw '未找到 Windows MSI 安装包'
          }

          Copy-Item $msi.FullName (Join-Path $assetDir "Aite-v$version-Windows.msi")

          @"
          ### Windows 产物

          - Aite-v$version-Windows.msi
          "@ | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append -Encoding utf8

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: aite-windows-installer
          path: ${{ runner.temp }}/aite-windows-artifacts/*
          if-no-files-found: error

  publish-release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs:
      - build-macos
      - build-windows

    steps:
      - name: Resolve release metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          TAG_NAME='${{ inputs.tag_name }}'
          RELEASE_NAME='${{ inputs.release_name }}'

          if [ -z "$RELEASE_NAME" ]; then
            RELEASE_NAME="Aite ${TAG_NAME}"
          fi

          {
            echo "tag_name=$TAG_NAME"
            echo "release_name=$RELEASE_NAME"
          } >> "$GITHUB_OUTPUT"

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: ${{ runner.temp }}/release-assets
          merge-multiple: true

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag_name }}
          name: ${{ steps.meta.outputs.release_name }}
          target_commitish: ${{ github.sha }}
          draft: ${{ inputs.draft }}
          prerelease: ${{ inputs.prerelease }}
          generate_release_notes: true
          files: ${{ runner.temp }}/release-assets/*
